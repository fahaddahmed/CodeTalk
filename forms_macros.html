{% macro renderFormField(field, placeholderText) %}
<section class="form-group">
    {{ field(class_='form-control', placeholder=placeholderText, **kwargs) }}
    {% if field.errors %}
        <div class="invalid-feedback d-block">
            {% for error in field.errors %}
                <p>{{ error }}</p>
            {% endfor %}
        </div>
    {% endif %}
</section>
{% endmacro %}
